<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>Factory Energy Meter Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <header class="topbar">
    <div class="brand">⚡ Factory Energy Meter</div>

    <div class="status">
      Last Update:
      <span id="lastUpdate">--:--:--</span>
    </div>
  </header>

  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <nav>
        <a class="active">Overview</a>
        <a href="#">Meters</a>
        <a href="#">History</a>
        <a href="#">Settings</a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main">

      <!-- KPI Cards -->
      <section class="kpis">

        <div class="card">
          <div class="label">Total Energy</div>
          <div class="value" id="energy">0</div>
          <div class="sub">kWh</div>
        </div>

        <div class="card">
          <div class="label">Current Power</div>
          <div class="value" id="power">0</div>
          <div class="sub">Watt</div>
        </div>

        <div class="card">
          <div class="label">Voltage</div>
          <div class="value" id="voltage">0</div>
          <div class="sub">Volt</div>
        </div>

        <div class="card">
          <div class="label">Current</div>
          <div class="value" id="current">0</div>
          <div class="sub">Ampere</div>
        </div>

        <div class="card">
          <div class="label">Frequency</div>
          <div class="value" id="frequency">0</div>
          <div class="sub">Hz</div>
        </div>

      </section>

      <!-- Charts -->
      <section class="charts">

        <div class="panel">
          <h3>Live Power Monitoring</h3>
          <canvas id="powerChart"></canvas>
        </div>

        <div class="panel">
          <h3>Realtime Voltage / Current</h3>
          <canvas id="multiChart"></canvas>
        </div>

      </section>

    </main>

  </div>

  <footer class="footer">
    © <span id="year"></span> Factory Energy Dashboard
  </footer>

  <script src="script.js"></script>

  <script>
    document.getElementById("year").innerText =
      new Date().getFullYear();
  </script>

</body>
</html>
