<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    DC Energy Dashboard
  </title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link
    rel="stylesheet"
    href="style.css"
  />

</head>

<body>

  <!-- ===================================================== -->
  <!-- TOPBAR -->
  <!-- ===================================================== -->

  <header class="topbar">

    <div class="logo">
      DC Energy Dashboard
    </div>

    <div class="topbar-right">

      <div class="datetime-box">

        <div id="liveDate">
          --
        </div>

        <div id="liveClock">
          --
        </div>

      </div>

      <div class="live-indicator">
        ● LIVE
      </div>

      <div class="last-update">

        Last Update:

        <span id="lastUpdate">
          --
        </span>

      </div>

    </div>

  </header>

  <!-- ===================================================== -->
  <!-- LAYOUT -->
  <!-- ===================================================== -->

  <div class="layout">

    <!-- ===================================================== -->
    <!-- SIDEBAR -->
    <!-- ===================================================== -->

    <aside class="sidebar">

      <button
        class="tab-btn active"
        onclick="showTab('overviewTab')"
      >
        Overview
      </button>

      <button
        class="tab-btn"
        onclick="showTab('historyTab')"
      >
        History
      </button>

    </aside>

    <!-- ===================================================== -->
    <!-- MAIN -->
    <!-- ===================================================== -->

    <main class="main-content">

      <!-- ===================================================== -->
      <!-- OVERVIEW TAB -->
      <!-- ===================================================== -->

      <section
        id="overviewTab"
        class="tab-content active"
      >
        <div class="kpi-grid">

  <div class="kpi-card">
    <div class="kpi-title">Total Power</div>
    <div class="kpi-value" id="totalPower">0</div>
  </div>

  <div class="kpi-card">
    <div class="kpi-title">Total Energy</div>
    <div class="kpi-value" id="totalEnergy">0</div>
  </div>

  <div class="kpi-card">
    <div class="kpi-title">Devices</div>
    <div class="kpi-value" id="totalDevices">0</div>
  </div>

</div>
        <div class="chart-grid">

          <!-- POWER -->
          <div class="panel gauge-panel">

            <h3>
              Total Power
            </h3>

            <div class="gauge-container">

              <canvas id="powerChart"></canvas>

              <div class="gauge-center">

                <div id="gaugePowerValue">
                  0
                </div>

                <div class="gauge-unit">
                  W
                </div>

              </div>

            </div>

          </div>

          <!-- VOLTAGE -->
          <div class="panel overview-panel">

            <h3>
              Voltage
            </h3>

            <canvas id="voltageChart"></canvas>

          </div>

           <!-- CURRENT -->
        <div class="panel overview-panel">

            <h3>
              Current
            </h3>

            <canvas id="currentChart"></canvas>

          </div>

          <!-- ENERGY -->
          <div class="panel overview-panel">

            <h3>
              Energy Per Device
            </h3>

            <canvas id="energyChart"></canvas>

          </div>
          <!-- FREQUENCY -->
          <div class="panel overview-panel">

            <h3>
              Frequency
            </h3>

            <canvas id="frequencyChart"></canvas>

          </div>
         

          <!-- DEVICE TABLE -->
          <div class="panel overview-panel">

            <h3>
              Devices
            </h3>

            <table class="device-table">

              <thead>

                <tr>

                  <th>
                    Device
                  </th>

                  <th>
                    Status
                  </th>

                  <th>
                    Voltage
                  </th>

                  <th>
                    Current
                  </th>

                  <th>
                    Power
                  </th>

                </tr>

              </thead>

              <tbody id="deviceTableBody">

              </tbody>

            </table>

          </div>

        </div>

      </section>

      <!-- ===================================================== -->
      <!-- HISTORY TAB -->
      <!-- ===================================================== -->

      <section
        id="historyTab"
        class="tab-content"
      >

        <!-- FILTERS -->
        <div class="history-filters">

          <!-- RANGE -->
          <select id="rangeSelect">

            <option value="-5m">
              Last 5 Minutes
            </option>

            <option value="-15m">
              Last 15 Minutes
            </option>

            <option value="-30m">
              Last 30 Minutes
            </option>

            <option value="-1h">
              Last 1 Hour
            </option>

            <option value="-6h">
              Last 6 Hours
            </option>

            <option value="-12h">
              Last 12 Hours
            </option>

            <option value="-24h">
              Last 24 Hours
            </option>

            <option value="-7d">
              Weekly
            </option>

            <option value="-30d">
              1 Month
            </option>

            <option value="-180d">
              6 Months
            </option>

            <option value="-365d">
              12 Months
            </option>

            <option value="custom">
              Custom
            </option>

          </select>

          <!-- CUSTOM -->
          <input
            type="datetime-local"
            id="startTime"
            style="display:none;"
          />

          <input
            type="datetime-local"
            id="endTime"
            style="display:none;"
          />
         
          <!-- DEVICE -->
          <select id="deviceSelect">

            <option value="all">
              All Devices
            </option>

          </select>

          <!-- FIELD -->
          <select id="fieldSelect">

            <option value="power">
              Power
            </option>

            <option value="voltage">
              Voltage
            </option>

            <option value="current">
              Current
            </option>

            <option value="energy">
              Energy
            </option>

            <option value="frequency">
              Frequency
            </option>

          </select>

          <button onclick="loadHistory()">
            Load History
          </button>

        </div>
 <div class="history-stats">
<div class="stat-card">
    <div class="stat-label">Minimum</div>
    <div id="historyMin" class="stat-value">0</div>
  </div>

  <div class="stat-card">
    <div class="stat-label">Average</div>
    <div id="historyAvg" class="stat-value">0</div>
  </div>

  <div class="stat-card">
    <div class="stat-label">Maximum</div>
    <div id="historyMax" class="stat-value">0</div>
  </div>
  </div>
        <!-- HISTORY GRAPH -->
        <div class="panel history-panel">

          <canvas id="historyChart"></canvas>

        </div>

        <!-- TABLE -->
       <div class="panel history-table-panel">

          <div class="history-table-wrapper">

             <table class="history-table">

            <thead>

              <tr>

                <th>
                  Time
                </th>

                <th>
                  Device
                </th>

                <th>
                  Field
                </th>

                <th>
                  Value
                </th>

              </tr>

            </thead>

            <tbody id="historyTableBody">

            </tbody>

          </table>

  </div>

</div>

      </section>

    </main>

  </div>

  <script src="script.js"></script>

</body>

</html>
